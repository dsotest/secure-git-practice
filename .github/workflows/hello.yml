name: Hello
on:
  pull_request:
    branches:
      - main
jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello World"
      - uses: actions/checkout@v4
  
  print_env:
    runs-on: ubuntu-latest
    env:
      PASSWORD: ${{ secrets.SYSTEM_PASSWORD }}
    steps:
      - run: echo "${PASSWORD}"